<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Brasil x Escócia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#009C3B,#FFDF00);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:#fff;
    width:100%;
    max-width:400px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#002776;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.placar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    height:60px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    border:2px solid #ddd;
    border-radius:12px;
}

.x{
    font-size:30px;
    font-weight:bold;
}

button{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    background:#002776;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#001d57;
}

.resultado{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#e8f5e9;
    text-align:center;
    display:none;
}
</style>
</head>

<body>

<div class="card">

    <h1>🇧🇷 Brasil x Escócia 🏴</h1>
    <p>Faça seu palpite</p>

    <div class="placar">
        <input type="number" id="brasil" min="0" placeholder="BR">
        <span class="x">X</span>
        <input type="number" id="escocia" min="0" placeholder="ESC">
    </div>

    <button onclick="registrarPalpite()">
        Registrar Palpite
    </button>

    <div class="resultado" id="resultado"></div>

</div>

<script>

function registrarPalpite(){

    let brasil = document.getElementById('brasil').value;
    let escocia = document.getElementById('escocia').value;

    if(brasil === '' || escocia === ''){
        alert('Informe o placar.');
        return;
    }

    document.getElementById('resultado').style.display = 'block';

    document.getElementById('resultado').innerHTML =
    `
    ✅ Seu palpite foi registrado!<br><br>
    <strong>Brasil ${brasil} x ${escocia} Escócia</strong>
    `;
}

</script>

</body>
</html>
