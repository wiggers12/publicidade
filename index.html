<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Brasil x Escócia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#009c3b,#ffdf00,#002776);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
}

.card{
  width:100%;
  max-width:430px;
  background:#fff;
  border-radius:30px;
  padding:28px;
  box-shadow:0 25px 60px rgba(0,0,0,.30);
}

.badge{
  background:#ffdf00;
  color:#002776;
  width:max-content;
  margin:0 auto 14px;
  padding:8px 18px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  letter-spacing:.5px;
}

h1{
  text-align:center;
  color:#002776;
  font-size:28px;
}

.sub{
  text-align:center;
  color:#64748b;
  margin:8px 0 24px;
}

.times{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}

.time{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:22px;
  padding:18px 10px;
  text-align:center;
}

.flag{font-size:38px;margin-bottom:6px}
.nome{font-weight:900;color:#0f172a}
.vs{font-size:20px;font-weight:900;color:#002776}

label{
  display:block;
  color:#002776;
  font-weight:900;
  margin:16px 0 8px;
}

.nome-input{
  width:100%;
  height:52px;
  border-radius:16px;
  border:2px solid #e2e8f0;
  padding:0 15px;
  font-size:16px;
  outline:none;
}

.placar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:12px;
}

.placar input{
  width:100%;
  height:76px;
  border-radius:22px;
  border:2px solid #dbeafe;
  background:#f1f5f9;
  text-align:center;
  font-size:38px;
  font-weight:900;
  color:#002776;
  outline:none;
}

input:focus{
  border-color:#009c3b;
  background:white;
}

.x{
  font-size:30px;
  font-weight:900;
}

button{
  width:100%;
  height:56px;
  border:none;
  border-radius:18px;
  margin-top:16px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(135deg,#002776,#0047ab);
  color:white;
}

.btn-whats{
  background:#25d366;
  color:white;
  display:none;
}

.btn-copy{
  background:#f1f5f9;
  color:#002776;
  display:none;
}

.resultado{
  display:none;
  margin-top:22px;
  padding:20px;
  border-radius:22px;
  background:linear-gradient(135deg,#ecfdf5,#eff6ff);
  border:1px solid #bbf7d0;
  text-align:center;
}

.resultado small{
  color:#64748b;
  font-weight:800;
}

.resultado strong{
  display:block;
  margin-top:8px;
  font-size:25px;
  color:#002776;
}

.footer{
  margin-top:22px;
  text-align:center;
  font-size:12px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="card">
  <div class="badge">BOLÃO OFICIAL</div>

  <h1>🇧🇷 Brasil x Escócia 🏴</h1>
  <div class="sub">Digite seu nome e o resultado do jogo</div>

  <div class="times">
    <div class="time">
      <div class="flag">🇧🇷</div>
      <div class="nome">Brasil</div>
    </div>

    <div class="vs">VS</div>

    <div class="time">
      <div class="flag">🏴</div>
      <div class="nome">Escócia</div>
    </div>
  </div>

  <label>Nome do participante</label>
  <input class="nome-input" type="text" id="participante" placeholder="Ex: Dionatan">

  <label>Resultado do jogo</label>
  <div class="placar">
    <input type="number" id="brasil" min="0" placeholder="0">
    <span class="x">x</span>
    <input type="number" id="escocia" min="0" placeholder="0">
  </div>

  <button class="btn-primary" onclick="registrarPalpite()">Registrar Palpite</button>
  <button class="btn-copy" id="btnCopiar" onclick="copiarPalpite()">Copiar Palpite</button>
  <button class="btn-whats" id="btnWhats" onclick="enviarWhatsApp()">Enviar no WhatsApp</button>

  <div class="resultado" id="resultado"></div>

  <div class="footer">
    Bolão entre amigos • Brasil x Escócia
  </div>
</div>

<script>
let mensagemFinal = "";

function registrarPalpite(){
  const nome = document.getElementById("participante").value.trim();
  const brasil = document.getElementById("brasil").value;
  const escocia = document.getElementById("escocia").value;
  const resultado = document.getElementById("resultado");

  if(nome === ""){
    alert("Digite o nome do participante.");
    return;
  }

  if(brasil === "" || escocia === ""){
    alert("Informe o placar completo.");
    return;
  }

  mensagemFinal =
`🏆 BOLÃO BRASIL X ESCÓCIA

👤 Participante: ${nome}
🇧🇷 Brasil ${brasil} x ${escocia} Escócia 🏴

✅ Palpite registrado!`;

  resultado.style.display = "block";
  resultado.innerHTML = `
    <small>✅ Palpite registrado com sucesso</small>
    <strong>${nome}</strong>
    <strong>Brasil ${brasil} x ${escocia} Escócia</strong>
  `;

  document.getElementById("btnCopiar").style.display = "block";
  document.getElementById("btnWhats").style.display = "block";
}

function copiarPalpite(){
  navigator.clipboard.writeText(mensagemFinal);
  alert("Palpite copiado!");
}

function enviarWhatsApp(){
  const texto = encodeURIComponent(mensagemFinal);
  window.open(`https://wa.me/?text=${texto}`, "_blank");
}
</script>

</body>
</html>
